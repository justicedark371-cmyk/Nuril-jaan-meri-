<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asim Ka Quiz 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }

    /* Website Standard Mobile Size */
    .container {
      width: 100%;
      max-width: 420px; 
      height: 90vh;     
      max-height: 800px;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      padding: 25px;
      text-align: center;
      position: relative;
      overflow-y: auto;
    }

    h1 { font-size: 1.8rem; color: #e74c3c; margin-bottom: 15px; }

    .progress { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 20px; }
    .progress-bar { height: 100%; width: 0%; background: #ff6b6b; border-radius: 10px; transition: 0.5s; }

    .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #333; }
    .options { display: flex; flex-direction: column; gap: 10px; }

    .option {
      background: #fff; padding: 12px 15px; border: 2px solid #eee;
      border-radius: 15px; cursor: pointer; transition: 0.3s; font-size: 1rem; text-align: left;
    }
    .option:hover { border-color: #e74c3c; background: #fff5f5; }

    .feedback { margin-top: 15px; font-weight: bold; min-height: 25px; }
    .correct-text { color: #27ae60; }
    .wrong-text { color: #e74c3c; }

    .next-btn {
      margin-top: 20px; padding: 15px; background: #e74c3c; color: white;
      border: none; border-radius: 25px; font-weight: bold; cursor: pointer; display: none;
    }

    /* Professional Report Button */
    .report-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #2980b9;
      color: white !important;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(41, 128, 185, 0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .end-screen { display: none; margin: auto; }
  </style>
</head>
<body>

<div class="container">
  <h1>Asim Ka Quiz 💕</h1>
  
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="quiz-box">
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="end-screen" id="endScreen">
    <h2 style="color: #e74c3c;">Quiz Khatam! 💖</h2>
    <div id="scoreDisplay" style="font-size: 3rem; margin: 20px 0; color: #27ae60;"></div>
    <p>App Mujhe Sach Mein Bahut Achhe Se Jaanti Hoon i love u so much 😘</p>
    
    <a href="https://drive.google.com/file/d/1xUTefj3U3jS9VF1B6uNReU4MGV7xGJq7/view" target="_blank" class="report-btn">
      View Video Report 📽️
    </a>
  </div>

  <button class="next-btn" id="nextBtn">Next →</button>
</div>

<script>
    const questions = [
      { q: "Question 1: Mera birthday kab aata hai?", options: ["26 January", "28 January", "27 January"], ans: 0 },
      { q: "Question 2: Mujhe khane mein kya pasand hai?", options: ["Daal chawal", "Biryani", "Kuchh bhi khila do", "Gobi"], ans: 1 },
      { q: "Question 3: Jab main gusse mein hota hun to main aapko kis naam se bulata hun?", options: ["Oye Sunoo", "Huda", "Al Nuril Huda Taukir", "Kuch nahi kehta"], ans: 2 },
      { q: "Question 4: Jab main aapse naraj hota hun to main kya karta hun?", options: ["Gussa karta hun", "Munh fula kar baith jata hun", "Yeh bas hmm hmm karta hoon", "Ladai ke alava kuch nahi"], ans: 2 },
      { q: "Question 5: Mujhe aapke upar gussa kab aata hai?", options: ["Late online aana", "Bina bataye gayab hona", "Pyar karna", "Baton ko ignore karna", "All of these"], ans: 4 },
      { q: "Question 6: Mera favourite color kaun sa hai?", options: ["RED", "BLUE", "GREEN", "BLACK"], ans: 3 },
      { q: "Question 7: Jab ladai hoti hai sabse phele mai kya karta hoon?", options: ["GUSSA", "CHUP HO JANA", "LADAI", "REPLY NA KARNA"], ans: 3 },
      { q: "Question 8: Main sabse jyada aapki kis chij ki tarif karta hun?", options: ["Lip", "HAIRS", "Ankhen", "Khubsurti"], ans: 2 },
      { q: "Question 9: Aapko mujhse pyar kitna hai?", options: ["Bhot hai", "Bss hai", "Pata nahi", "Infinity"], ans: 3 },
      { q: "Question 10: Aapko mujhmein sabse acchi baat kya lagti hai?", options: ["Type here..."], ans: null, open: true }
    ];

    let current = 0; let score = 0; let answered = false;
    const qEl = document.getElementById("question");
    const optsEl = document.getElementById("options");
    const fbEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const prog = document.getElementById("progressBar");
    const endScreen = document.getElementById("endScreen");
    const quizBox = document.getElementById("quiz-box");

    function loadQuestion() {
      answered = false; fbEl.innerHTML = ""; nextBtn.style.display = "none";
      const qq = questions[current];
      qEl.innerText = qq.q;
      optsEl.innerHTML = "";
      if (qq.open) {
        const input = document.createElement("input");
        input.type = "text"; input.className = "open-input";
        input.placeholder = "Apna jawab likho... 💕";
        optsEl.appendChild(input);
        nextBtn.innerText = "Submit & Finish 💖";
        nextBtn.style.display = "block";
        nextBtn.onclick = () => showEnd();
        return;
      }
      qq.options.forEach((opt, i) => {
        const btn = document.createElement("div");
        btn.classList.add("option"); btn.innerText = opt;
        btn.onclick = () => checkAnswer(i);
        optsEl.appendChild(btn);
      });
      prog.style.width = ((current + 1) / questions.length) * 100 + "%";
    }

    function checkAnswer(idx) {
      if (answered) return;
      answered = true;
      const correct = questions[current].ans;
      const btns = document.querySelectorAll(".option");
      if (idx === correct) {
        score++;
        fbEl.innerHTML = "<span class='correct-text'>Sahi Jawab! 🎉</span>";
        btns[idx].style.borderColor = "#27ae60";
      } else {
        fbEl.innerHTML = `<span class='wrong-text'>Galat! 😔 Sahi: ${questions[current].options[correct]}</span>`;
        btns[idx].style.borderColor = "#e74c3c";
      }
      nextBtn.style.display = "block";
    }

    nextBtn.onclick = () => {
      current++;
      if (current < questions.length) loadQuestion();
      else showEnd();
    };

    function showEnd() {
      quizBox.style.display = "none";
      nextBtn.style.display = "none";
      prog.parentElement.style.display = "none";
      endScreen.style.display = "block";
      document.getElementById("scoreDisplay").innerText = score + "/9";
    }

    loadQuestion();
</script>
</body>
</html>
